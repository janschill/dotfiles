set-option -sa terminal-overrides ",*256col*:Tc"
set-option -sa terminal-overrides ",xterm*:Tc"
# Disable OSC sequences in VS Code terminal to prevent escape sequence display
set-option -sa terminal-overrides ",xterm-256color:Ms="
set -g default-terminal "tmux-256color"
set -g mouse on

# Prefix key
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Window navigation
bind -n M-H previous-window
bind -n M-L next-window

# Open panes in current dir
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Start index at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Jingle Bells
set -g allow-passthrough on
set -g bell-action any
set -g monitor-bell on
set -g visual-bell off

# Rename windows to path
set-option -g status-interval 5
set-option -g automatic-rename on
set-option -g automatic-rename-format "#{b:pane_current_path} (#{pane_current_command})"

set -sg escape-time 0

set -g status-right '#(gitmux -cfg $HOME/.config/tmux/gitmux/.gitmux.conf "#{pane_current_path}")'


# Theming
set -g @catppuccin_flavour 'macciato' # or 'latte', 'frappe', 'macchiato'
# Disable terminal color sequences that cause escape codes in VS Code
set -g @catppuccin_no_patched_fonts_theme_enabled on
set -g @catppuccin_directory_text "#{pane_current_path}"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_modules_right "directory session"
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_text "#W"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
